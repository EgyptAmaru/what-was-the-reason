<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host Console · What Was the Reason?</title>
<link rel="stylesheet" href="css/fonts.css">
<link rel="stylesheet" href="css/host.css">
</head>
<body>

<!-- Join -->
<section id="join" class="hscreen active">
  <div class="join-inner">
    <div class="four-dots" aria-hidden="true"><span class="d1"></span><span class="d2"></span><span class="d3"></span><span class="d4"></span></div>
    <h1>Host Console</h1>
    <p class="join-sub">Hints, host notes, and remote control for the board on the TV.</p>
    <form id="join-form">
      <label for="room-input">Room code</label>
      <input id="room-input" type="text" autocomplete="off" autocapitalize="characters" maxlength="4" placeholder="ABCD">
      <button type="submit" class="join-btn">Connect</button>
    </form>
    <p class="join-note" id="join-note"></p>
    <button type="button" class="browse-link" id="browse-btn">Browse notes without connecting</button>
  </div>
</section>

<!-- Console -->
<section id="console" class="hscreen">
  <header class="chead">
    <div class="c-room">
      <span class="conn-dot" id="conn-dot"></span>
      <span id="room-label"></span>
    </div>
    <div class="c-scores" id="c-scores"></div>
  </header>
  <main class="cbody" id="cbody"></main>
  <footer class="controls" id="controls"></footer>
</section>

<script src="data/questions.js"></script>
<script src="js/charts.js"></script>
<script src="js/format.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/host.js"></script>
</body>
</html>
